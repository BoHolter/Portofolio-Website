<div class="container">
    <img src="foto/bo12.jpg" alt="Foto van Bo Holter" class="profiel-foto">
    
  </div>

  <div class="typewriter" id="typewriter"></div>
  
  <script>
    const tekst = `Ik ben Bo Holter, een enthousiaste student Software/Game Development aan het ROC Almere Buiten. Mijn interesse ligt bij programmeren en het ontwikkelen van creatieve en technische oplossingen. Tijdens mijn opleiding heb ik gewerkt met onder andere C#, C++, HTML en Unity, waarbij ik zowel mijn technische kennis als mijn probleemoplossend vermogen heb kunnen versterken.

Ik ben leergierig, werk graag zelfstandig maar functioneer ook goed binnen een team. Door mijn werkervaring bij de Vomar en als krantenbezorger heb ik geleerd om klantgericht, flexibel en verantwoordelijk te werken. Ik ben op zoek naar een stageplek waar ik mijn vaardigheden in de praktijk kan toepassen en mezelf verder kan ontwikkelen in een professionele omgeving.`;

    let i = 0;
    const snelheid = 15;

    function typeEffect() {
      if (i < tekst.length) {
        document.getElementById("typewriter").textContent += tekst.charAt(i);
        i++;
        setTimeout(typeEffect, snelheid);
      }
    }

    window.onload = typeEffect;
  </script>
